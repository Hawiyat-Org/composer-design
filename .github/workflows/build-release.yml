name: build-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.11.1-composer.1)'
        required: true
        type: string
        default: '0.11.1-composer.1'

permissions:
  contents: write
  actions: read

jobs:
  build-linux:
    name: Build Linux package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build all dependencies
        shell: bash
        run: |
          pnpm --filter @open-design/release build && \
          pnpm --filter @open-design/contracts build && \
          pnpm --filter @open-design/sidecar-proto build && \
          pnpm --filter @open-design/platform build && \
          pnpm --filter @open-design/sidecar build && \
          pnpm --filter @open-design/host build && \
          pnpm --filter @open-design/metatool build && \
          pnpm --filter @open-design/plugin-runtime build && \
          pnpm --filter @open-design/download build && \
          pnpm --filter @open-design/launcher-proto build && \
          pnpm --filter @open-design/components build && \
          pnpm --filter @open-design/web build && \
          pnpm --filter @open-design/daemon build && \
          pnpm --filter @open-design/desktop build && \
          pnpm --filter @open-design/packaged build && \
          pnpm --filter @open-design/tools-pack build
      - name: Install AppImage dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libfuse2 desktop-file-utils
      - name: Build Linux AppImage
        run: pnpm tools-pack linux build --to appimage --portable
        env:
          CI: true
      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: .tmp/tools-pack/out/linux/namespaces/default/builder/*.AppImage
          if-no-files-found: warn

  build-windows:
    name: Build Windows package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build all dependencies
        shell: bash
        run: |
          pnpm --filter @open-design/release build && \
          pnpm --filter @open-design/contracts build && \
          pnpm --filter @open-design/sidecar-proto build && \
          pnpm --filter @open-design/platform build && \
          pnpm --filter @open-design/sidecar build && \
          pnpm --filter @open-design/host build && \
          pnpm --filter @open-design/metatool build && \
          pnpm --filter @open-design/plugin-runtime build && \
          pnpm --filter @open-design/download build && \
          pnpm --filter @open-design/launcher-proto build && \
          pnpm --filter @open-design/components build && \
          pnpm --filter @open-design/web build && \
          pnpm --filter @open-design/daemon build && \
          pnpm --filter @open-design/desktop build && \
          pnpm --filter @open-design/packaged build && \
          pnpm --filter @open-design/tools-pack build
      - name: Install NSIS
        run: choco install nsis -y
      - name: Build Windows NSIS installer
        run: pnpm tools-pack win build --to nsis --portable
        env:
          CI: true
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: .tmp\tools-pack\out\win\namespaces\default\builder\*.exe
          if-no-files-found: warn

  build-macos:
    name: Build macOS package
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build all dependencies
        run: |
          pnpm --filter @open-design/release build && \
          pnpm --filter @open-design/contracts build && \
          pnpm --filter @open-design/sidecar-proto build && \
          pnpm --filter @open-design/platform build && \
          pnpm --filter @open-design/sidecar build && \
          pnpm --filter @open-design/host build && \
          pnpm --filter @open-design/metatool build && \
          pnpm --filter @open-design/plugin-runtime build && \
          pnpm --filter @open-design/download build && \
          pnpm --filter @open-design/launcher-proto build && \
          pnpm --filter @open-design/components build && \
          pnpm --filter @open-design/web build && \
          pnpm --filter @open-design/daemon build && \
          pnpm --filter @open-design/desktop build && \
          pnpm --filter @open-design/packaged build && \
          pnpm --filter @open-design/tools-pack build
      - name: Build macOS DMG
        run: pnpm tools-pack mac build --to dmg --portable
        env:
          CI: true
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: .tmp/tools-pack/out/mac/namespaces/default/dmg/*.dmg
          if-no-files-found: warn

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ inputs.version }}
        shell: bash
        run: |
          shopt -s nullglob
          FILES=(linux-appimage/* windows-installer/* macos-dmg/*)
          echo "Found ${#FILES[@]} artifact files to upload"
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "ERROR: No artifact files found to upload!" >&2
            exit 1
          fi
          gh release create "$TAG" \
            --title "Composer Design v${{ inputs.version }}" \
            --notes "Composer Design by Hawiyat Team — fork of Open Design v0.11.1" \
            --generate-notes \
            "${FILES[@]}"
